name: IndexNow 流式推送

on:
  # 每天 UTC 6:00 = 北京时间 14:00 自动推送
  schedule:
    - cron: '0 6 * * *'
  # push 到 main 分支时自动触发
  push:
    branches: [ main ]
    paths:
      - 'src/app/**'
      - 'prisma/schema.prisma'
      - 'prisma/seed.ts'
      - 'src/scripts/**'
  # 手动触发
  workflow_dispatch:

jobs:
  indexnow-submit:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖（含 dev）
        run: npm install
        working-directory: .

      - name: 流式推送 IndexNow
        run: npx tsx src/scripts/submit-indexnow.ts
        working-directory: .
